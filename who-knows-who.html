<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who Knows Who Better?</title>
    <link rel="stylesheet" href="styles/shared.css">
    <style>
        .quiz-section {
            display: none;
        }

        .quiz-section.active {
            display: block;
        }

        .question-card {
            background: #f8f8f8;
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .question-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            padding: 15px 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            text-align: left;
        }

        .option-btn:hover {
            border-color: #764ba2;
            background: #f0f0ff;
        }

        .option-btn.selected {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }

        .results-section {
            display: none;
            text-align: center;
        }

        .score-display {
            font-size: 3rem;
            font-weight: bold;
            color: #764ba2;
            margin: 20px 0;
        }

        .score-breakdown {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .score-item:last-child {
            border-bottom: none;
        }

        .winner-announcement {
            font-size: 1.5rem;
            color: #764ba2;
            font-weight: bold;
            margin: 20px 0;
        }

        .progress-indicator {
            text-align: center;
            color: #666;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Games</a>

        <h1>🤔 Who Knows Who Better?</h1>
        <p class="subtitle">Test how well you and your friend know each other!</p>

        <!-- Setup Section -->
        <div id="setupSection" class="quiz-section active">
            <div class="input-group">
                <label for="name1">Player 1 Name</label>
                <input type="text" id="name1" placeholder="Enter your name">
            </div>

            <div class="input-group">
                <label for="name2">Player 2 Name</label>
                <input type="text" id="name2" placeholder="Enter your friend's name">
            </div>

            <button class="btn" onclick="startGame()">Start Quiz</button>
        </div>

        <!-- Quiz Section -->
        <div id="quizSection" class="quiz-section">
            <div class="progress-indicator" id="progressIndicator">Question 1 of 10</div>
            
            <div class="question-card">
                <div class="question-text" id="questionText"></div>
                <div class="options-container" id="optionsContainer"></div>
            </div>

            <button class="btn" onclick="submitAnswer()" id="submitBtn" style="display: none;">Submit Answer</button>
            <button class="btn" onclick="nextQuestion()" id="nextBtn" style="display: none;">Next Question</button>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="quiz-section results-section">
            <h2>Quiz Complete!</h2>
            <div class="winner-announcement" id="winnerAnnouncement"></div>
            
            <div class="score-breakdown">
                <div class="score-item">
                    <span id="player1Name">Player 1</span>
                    <span id="player1Score">0/10</span>
                </div>
                <div class="score-item">
                    <span id="player2Name">Player 2</span>
                    <span id="player2Score">0/10</span>
                </div>
            </div>

            <div class="score-display" id="finalScore"></div>
            <p id="resultMessage"></p>

            <button class="btn" onclick="resetGame()" style="margin-top: 20px;">Play Again</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "What is their favorite hobby?",
                options: ["Sports", "Reading", "Gaming", "Music", "Cooking", "Travel"]
            },
            {
                question: "What's their favorite food?",
                options: ["Pizza", "Pasta", "Sushi", "Burgers", "Tacos", "Salad"]
            },
            {
                question: "What type of movies do they prefer?",
                options: ["Action", "Comedy", "Drama", "Horror", "Sci-Fi", "Romance"]
            },
            {
                question: "What's their ideal weekend?",
                options: ["Partying", "Relaxing at home", "Outdoor adventure", "Shopping", "Watching movies", "Meeting friends"]
            },
            {
                question: "What's their favorite season?",
                options: ["Spring", "Summer", "Fall", "Winter"]
            },
            {
                question: "What's their go-to drink?",
                options: ["Coffee", "Tea", "Juice", "Water", "Soda", "Smoothie"]
            },
            {
                question: "What's their favorite color?",
                options: ["Blue", "Red", "Green", "Purple", "Black", "White"]
            },
            {
                question: "How do they spend free time?",
                options: ["Social media", "Exercise", "Reading", "Gaming", "Watching TV", "Hanging with friends"]
            },
            {
                question: "What's their personality type?",
                options: ["Outgoing", "Reserved", "Adventurous", "Calm", "Funny", "Serious"]
            },
            {
                question: "What's their dream destination?",
                options: ["Beach", "Mountains", "Big city", "Countryside", "Foreign country", "Staycation"]
            }
        ];

        let currentQuestion = 0;
        let player1Answers = [];
        let player2Answers = [];
        let player1Score = 0;
        let player2Score = 0;
        let currentPlayer = 1;
        let selectedOption = null;

        function startGame() {
            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();

            if (!name1 || !name2) {
                alert('Please enter both names!');
                return;
            }

            document.getElementById('setupSection').classList.remove('active');
            document.getElementById('quizSection').classList.add('active');
            
            player1Answers = [];
            player2Answers = [];
            player1Score = 0;
            player2Score = 0;
            currentQuestion = 0;
            currentPlayer = 1;
            
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQuestion];
            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();
            
            document.getElementById('progressIndicator').textContent = `Question ${currentQuestion + 1} of 10 - ${currentPlayer === 1 ? name1 : name2}'s turn`;
            document.getElementById('questionText').textContent = `For ${currentPlayer === 1 ? name2 : name1}: ${q.question}`;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => selectOption(index, btn);
                optionsContainer.appendChild(btn);
            });

            selectedOption = null;
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'none';
        }

        function selectOption(index, btn) {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedOption = index;
        }

        function submitAnswer() {
            if (selectedOption === null) {
                alert('Please select an answer!');
                return;
            }

            if (currentPlayer === 1) {
                player1Answers.push(selectedOption);
            } else {
                player2Answers.push(selectedOption);
            }

            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestion++;
            
            if (currentQuestion >= questions.length) {
                calculateScores();
                showResults();
                return;
            }

            // Switch player
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            loadQuestion();
        }

        function calculateScores() {
            for (let i = 0; i < questions.length; i++) {
                if (player1Answers[i] === player2Answers[i]) {
                    player1Score++;
                    player2Score++;
                }
            }
        }

        function showResults() {
            document.getElementById('quizSection').classList.remove('active');
            document.getElementById('resultsSection').style.display = 'block';

            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();

            document.getElementById('player1Name').textContent = name1;
            document.getElementById('player2Name').textContent = name2;
            document.getElementById('player1Score').textContent = `${player1Score}/${questions.length}`;
            document.getElementById('player2Score').textContent = `${player2Score}/${questions.length}`;

            let winnerText = '';
            if (player1Score > player2Score) {
                winnerText = `🎉 ${name1} knows ${name2} better!`;
            } else if (player2Score > player1Score) {
                winnerText = `🎉 ${name2} knows ${name1} better!`;
            } else {
                winnerText = `🤝 It's a tie! You both know each other equally well!`;
            }

            document.getElementById('winnerAnnouncement').textContent = winnerText;
            document.getElementById('finalScore').textContent = `${player1Score} - ${player2Score}`;
            
            const matchPercent = Math.round((player1Score / questions.length) * 100);
            document.getElementById('resultMessage').textContent = `You both matched on ${matchPercent}% of answers!`;
        }

        function resetGame() {
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('setupSection').classList.add('active');
            document.getElementById('name1').value = '';
            document.getElementById('name2').value = '';
        }
    </script>
</body>
</html>
