<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator</title>
    <link rel="stylesheet" href="styles/shared.css">
    <style>
        .percentage-display {
            font-size: 5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }

        .love-meter {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }

        .love-meter-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ee5a6f, #ff6b6b);
            border-radius: 15px;
            transition: width 1.5s ease-out;
            width: 0;
        }

        .love-message {
            font-size: 1.5rem;
            color: #333;
            margin-top: 20px;
            font-weight: 600;
        }

        .hearts-container {
            font-size: 2rem;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Games</a>
        
        <h1>💕 Love Calculator 💕</h1>
        <p class="subtitle">Calculate your love compatibility percentage</p>

        <div class="input-group">
            <label for="name1">Your Name</label>
            <input type="text" id="name1" placeholder="Enter your name">
        </div>

        <div class="input-group">
            <label for="name2">Partner's Name</label>
            <input type="text" id="name2" placeholder="Enter partner's name">
        </div>

        <button class="btn" onclick="calculateLove()">Calculate Love</button>

        <div class="result-section" id="resultSection">
            <div class="percentage-display" id="percentage">0%</div>
            <div class="love-meter">
                <div class="love-meter-fill" id="loveMeter"></div>
            </div>
            <div class="hearts-container" id="heartsContainer"></div>
            <div class="love-message" id="loveMessage"></div>
        </div>
    </div>

    <script>
        const loveMessages = [
            { min: 0, max: 20, message: "💔 Might want to stay friends...", hearts: "💔" },
            { min: 21, max: 40, message: "🤔 There's some potential here...", hearts: "💕" },
            { min: 41, max: 60, message: "😊 Good compatibility!", hearts: "💕💕" },
            { min: 61, max: 80, message: "😍 Strong connection!", hearts: "💕💕💕" },
            { min: 81, max: 95, message: "🔥 Amazing match!", hearts: "💕💕💕💕" },
            { min: 96, max: 100, message: "💖 PERFECT MATCH! 💖", hearts: "💕💕💕💕💕" }
        ];

        function calculateLove() {
            const name1 = document.getElementById('name1').value.trim().toLowerCase();
            const name2 = document.getElementById('name2').value.trim().toLowerCase();

            if (!name1 || !name2) {
                alert('Please enter both names!');
                return;
            }

            // Generate percentage based on names (consistent for same names)
            let percentage = 0;
            const combined = (name1 + name2).split('').sort().join('');
            for (let i = 0; i < combined.length; i++) {
                percentage += combined.charCodeAt(i);
            }
            percentage = (percentage % 101);

            // Add some randomness based on name lengths
            percentage = Math.abs(percentage - name1.length * name2.length) % 101;

            displayResult(percentage);
        }

        function displayResult(percentage) {
            const resultSection = document.getElementById('resultSection');
            const percentageEl = document.getElementById('percentage');
            const loveMeter = document.getElementById('loveMeter');
            const heartsContainer = document.getElementById('heartsContainer');
            const loveMessage = document.getElementById('loveMessage');

            resultSection.style.display = 'block';
            
            // Animate percentage counter
            let currentPercent = 0;
            const interval = setInterval(() => {
                if (currentPercent >= percentage) {
                    clearInterval(interval);
                } else {
                    currentPercent++;
                    percentageEl.textContent = currentPercent + '%';
                }
            }, 15);

            // Animate meter
            setTimeout(() => {
                loveMeter.style.width = percentage + '%';
            }, 100);

            // Get message
            const messageData = loveMessages.find(m => percentage >= m.min && percentage <= m.max);
            heartsContainer.textContent = messageData.hearts;
            loveMessage.textContent = messageData.message;
        }
    </script>
    <script src="scripts/utils.js"></script>
</body>
</html>
