<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAMES Game</title>
    <link rel="stylesheet" href="styles/shared.css">
    <style>
        .flames-result {
            display: none;
            margin-top: 30px;
        }

        .flames-animation {
            text-align: center;
            margin: 20px 0;
        }

        .flame-letter {
            display: inline-block;
            width: 50px;
            height: 50px;
            line-height: 50px;
            margin: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .flame-letter.active {
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(255, 100, 100, 0.8);
        }

        .flame-letter.eliminated {
            opacity: 0.3;
            transform: scale(0.8);
        }

        .flame-letter.winner {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1.2); }
            50% { transform: scale(1.3); }
        }

        .result-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .result-letter {
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
        }

        .result-meaning {
            font-size: 1.5rem;
            margin: 10px 0;
        }

        .result-emoji {
            font-size: 3rem;
            margin: 10px 0;
        }

        .fire-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container" id="flamesGame">
        <a href="index.html" class="back-btn">← Back to Games</a>

        <h1>🔥 FLAMES</h1>
        <p class="subtitle">Discover your relationship compatibility</p>

        <div class="input-group">
            <label for="name1">Your Name</label>
            <input type="text" id="name1" placeholder="Enter your name">
        </div>

        <div class="input-group">
            <label for="name2">Partner's Name</label>
            <input type="text" id="name2" placeholder="Enter partner's name">
        </div>

        <button class="btn" onclick="calculateFLAMES()">Calculate FLAMES</button>

        <div class="flames-result" id="flamesResult">
            <div class="flames-animation">
                <div class="fire-icon">🔥</div>
                <div id="lettersContainer"></div>
            </div>

            <div class="result-box">
                <div class="result-emoji" id="resultEmoji"></div>
                <div class="result-letter" id="resultLetter"></div>
                <div class="result-meaning" id="resultMeaning"></div>
            </div>
        </div>
    </div>

    <script src="scripts/utils.js"></script>
    <script>
        const flamesData = [
            { letter: 'F', meaning: 'Friends', emoji: '🤝' },
            { letter: 'L', meaning: 'Lovers', emoji: '💕' },
            { letter: 'A', meaning: 'Affectionate', emoji: '💖' },
            { letter: 'M', meaning: 'Married', emoji: '💍' },
            { letter: 'E', meaning: 'Enemies', emoji: '⚔️' },
            { letter: 'S', meaning: 'Siblings', emoji: '👫' }
        ];

        function calculateFLAMES() {
            clearMessages('flamesGame');
            
            const name1 = document.getElementById('name1').value.trim().toLowerCase().replace(/[^a-z]/g, '');
            const name2 = document.getElementById('name2').value.trim().toLowerCase().replace(/[^a-z]/g, '');

            if (!name1 || !name2) {
                showError('flamesGame', 'Please enter both names!');
                return;
            }

            // Count remaining letters after canceling common ones
            const name1Chars = name1.split('');
            const name2Chars = name2.split('');

            for (let char of name1Chars) {
                const index = name2Chars.indexOf(char);
                if (index !== -1) {
                    name2Chars.splice(index, 1);
                }
            }

            for (let char of name2Chars) {
                const index = name1Chars.indexOf(char);
                if (index !== -1) {
                    name1Chars.splice(index, 1);
                }
            }

            const count = name1Chars.length + name2Chars.length;

            // Show result section
            const resultSection = document.getElementById('flamesResult');
            resultSection.style.display = 'block';

            // Animate FLAMES
            animateFLAMES(count);
        }

        function animateFLAMES(count) {
            let letters = [...flamesData];
            const lettersContainer = document.getElementById('lettersContainer');
            
            // Initial display
            lettersContainer.innerHTML = letters.map(l => 
                `<div class="flame-letter" id="letter-${l.letter}">${l.letter}</div>`
            ).join('');

            let currentIndex = 0;
            let step = 0;
            const maxSteps = count * 6;

            const interval = setInterval(() => {
                // Remove active class from all
                document.querySelectorAll('.flame-letter').forEach(el => el.classList.remove('active'));
                
                // Add active class to current
                const currentLetter = document.getElementById(`letter-${letters[currentIndex].letter}`);
                if (currentLetter) currentLetter.classList.add('active');

                currentIndex = (currentIndex + 1) % letters.length;
                step++;

                // Eliminate a letter every 'count' steps
                if (step % count === 0 && letters.length > 1) {
                    const eliminateIndex = (currentIndex - 1 + letters.length) % letters.length;
                    const eliminatedLetter = letters[eliminateIndex].letter;
                    const el = document.getElementById(`letter-${eliminatedLetter}`);
                    if (el) {
                        el.classList.add('eliminated');
                        el.classList.remove('active');
                    }
                    letters.splice(eliminateIndex, 1);
                    currentIndex = eliminateIndex % letters.length;
                }

                if (letters.length === 1) {
                    clearInterval(interval);
                    showFinalResult(letters[0]);
                }
            }, 100);
        }

        function showFinalResult(result) {
            setTimeout(() => {
                // Remove active from all
                document.querySelectorAll('.flame-letter').forEach(el => {
                    el.classList.remove('active');
                    if (!el.classList.contains('eliminated')) {
                        el.classList.add('winner');
                    }
                });

                document.getElementById('resultEmoji').textContent = result.emoji;
                document.getElementById('resultLetter').textContent = result.letter;
                document.getElementById('resultMeaning').textContent = result.meaning;
                
                // Trigger confetti celebration!
                createConfetti(150);
                showSuccess('flamesResult', `You are ${result.meaning}!`);
            }, 500);
        }
    </script>
</body>
</html>
