<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mad Libs</title>
    <link rel="stylesheet" href="styles/shared.css">
    <style>
        .game-section {
            display: none;
        }

        .game-section.active {
            display: block;
        }

        .story-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
            justify-content: center;
        }

        .story-btn {
            padding: 12px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .story-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .word-input {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 10px;
        }

        .word-input label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }

        .word-input input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }

        .word-input input:focus {
            outline: none;
            border-color: #764ba2;
        }

        .story-result {
            background: linear-gradient(135deg, #fff9e6 0%, #fff 100%);
            border: 2px solid #ffd700;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            line-height: 2;
            font-size: 1.1rem;
        }

        .filled-word {
            background: #ffd700;
            padding: 2px 8px;
            border-radius: 5px;
            font-weight: bold;
            color: #764ba2;
        }

        .emoji-header {
            font-size: 3rem;
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Games</a>

        <h1>📝 Mad Libs</h1>
        <p class="subtitle">Fill in the blanks to create hilarious stories!</p>

        <!-- Story Selection -->
        <div id="selectionSection" class="game-section active">
            <h3 style="text-align: center; color: #764ba2; margin-bottom: 15px;">Choose a Story:</h3>
            <div class="story-selector">
                <button class="story-btn active" onclick="selectStory(0)">🎬 Movie Star</button>
                <button class="story-btn" onclick="selectStory(1)">🍕 Restaurant</button>
                <button class="story-btn" onclick="selectStory(2)">🎢 Theme Park</button>
                <button class="story-btn" onclick="selectStory(3)">🏖️ Vacation</button>
                <button class="story-btn" onclick="selectStory(4)">🎤 Concert</button>
                <button class="story-btn" onclick="selectStory(5)">😈 Hookup</button>
                <button class="story-btn" onclick="selectStory(6)">🍺 Hangover</button>
                <button class="story-btn" onclick="selectStory(7)">💀 Worst Date</button>
                <button class="story-btn" onclick="selectStory(8)">🚫 Office</button>
                <button class="story-btn" onclick="selectStory(9)">🎰 Vegas</button>
                <button class="story-btn" onclick="selectStory(10)">👻 Haunted</button>
                <button class="story-btn" onclick="selectStory(11)">🌶️ Spicy</button>
            </div>

            <div class="emoji-header" id="storyEmoji">🎬</div>
            <p id="storyDescription" style="text-align: center; color: #666; margin: 20px 0;">
                Create a funny story about becoming a famous movie star!
            </p>

            <button class="btn" onclick="goToInputs()">Start Writing!</button>
        </div>

        <!-- Inputs Section -->
        <div id="inputsSection" class="game-section">
            <h3 style="color: #764ba2; margin-bottom: 15px;">Fill in the Words:</h3>
            <div class="inputs-grid" id="inputsGrid"></div>
            <button class="btn" onclick="generateStory()">Create Story!</button>
            <button class="btn" onclick="backToSelection()" style="background: #f0f0f0; color: #333; margin-top: 10px;">Back</button>
        </div>

        <!-- Result Section -->
        <div id="resultSection" class="game-section">
            <h2 style="text-align: center; color: #764ba2;">Your Masterpiece!</h2>
            <div class="story-result" id="storyResult"></div>
            <button class="btn" onclick="copyStory()">📋 Copy Story</button>
            <button class="btn" onclick="backToSelection()" style="background: #f0f0f0; color: #333; margin-top: 10px;">Create Another</button>
        </div>
    </div>

    <script>
        let currentCategoryIndex = 0;
        let currentStory = null;
        let allCategories = [];

        // Load stories from JSON file
        fetch('stories.json')
            .then(response => response.json())
            .then(data => {
                allCategories = data.categories;
                initializeStorySelector();
            })
            .catch(error => {
                console.error('Error loading stories:', error);
                alert('Failed to load stories. Please refresh the page.');
            });

        function initializeStorySelector() {
            if (allCategories.length > 0) {
                selectStory(0);
            }
        }

        function selectStory(index) {
            currentCategoryIndex = index;
            document.querySelectorAll('.story-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            const category = allCategories[index];
            document.getElementById('storyEmoji').textContent = category.emoji;
            document.getElementById('storyDescription').textContent = category.description;
        }

        function goToInputs() {
            document.getElementById('selectionSection').classList.remove('active');
            document.getElementById('inputsSection').classList.add('active');

            // Randomly select a story variation from the category
            const category = allCategories[currentCategoryIndex];
            const randomIndex = Math.floor(Math.random() * category.stories.length);
            currentStory = category.stories[randomIndex];

            const grid = document.getElementById('inputsGrid');
            grid.innerHTML = '';

            currentStory.words.forEach(word => {
                grid.innerHTML += `
                    <div class="word-input">
                        <label>${word.label}</label>
                        <input type="text" id="${word.id}" placeholder="Enter ${word.label.toLowerCase()}">
                    </div>
                `;
            });
        }

        function backToSelection() {
            document.querySelectorAll('.game-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById('selectionSection').classList.add('active');
        }

        function generateStory() {
            let resultText = currentStory.template;
            let allFilled = true;
            let filledValues = {};

            currentStory.words.forEach(word => {
                const value = document.getElementById(word.id).value.trim();
                if (!value) {
                    allFilled = false;
                    return;
                }
                filledValues[word.id] = value;
            });

            if (!allFilled) {
                alert('Please fill in all the words!');
                return;
            }

            // Replace placeholders with filled values
            currentStory.words.forEach(word => {
                const regex = new RegExp(`\\*\\*\\{${word.id}\\}\\*\\*`, 'g');
                resultText = resultText.replace(regex, `<span class="filled-word">${filledValues[word.id]}</span>`);
            });

            document.getElementById('inputsSection').classList.remove('active');
            document.getElementById('resultSection').classList.add('active');
            document.getElementById('storyResult').innerHTML = resultText.replace(/\n/g, '<br><br>');
        }

        function copyStory() {
            const text = document.getElementById('storyResult').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('Story copied! Share the laughs! 😄');
            });
        }
    </script>
</body>
</html>
